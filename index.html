<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian Jobs Vacancy 2026 | Sarkari & Private Job Alerts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Leaderboard Ad Banner -->
  <div class="ad-banner top-ad">
    <span>Ad Space – 728x90</span>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <h1>🇮🇳 IndianJobs<span class="accent">Portal</span></h1>
        <p>Real-time Sarkari & Private Vacancies</p>
      </div>
      <!-- Simple Navigation -->
      <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Govt Jobs</a>
        <a href="#">Private Jobs</a>
        <a href="#">Internships</a>
      </nav>
    </div>
  </header>

  <div class="container main-layout">
    <!-- Main Content Area -->
    <main class="content">
      <!-- Search & Filters -->
      <section class="filters-card">
        <h2>Find Your Dream Job</h2>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by title or company...">
          <button id="searchBtn">🔍 Search</button>
        </div>
        <div class="filter-row">
          <select id="locationFilter">
            <option value="">📍 All Locations</option>
            <!-- Populated from jobs but hardcoded for common ones -->
            <option value="All India">All India</option>
            <option value="Across India">Across India</option>
            <option value="Bengaluru">Bengaluru</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Delhi / NCR">Delhi / NCR</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Pune">Pune</option>
            <option value="Chennai">Chennai</option>
            <option value="Work from Home">Work from Home</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Maharashtra">Maharashtra</option>
          </select>
          <select id="typeFilter">
            <option value="">💼 All Job Types</option>
            <option value="Sarkari Naukri">Sarkari Naukri</option>
            <option value="Private Job">Private Job</option>
            <option value="Internship">Internship</option>
            <option value="Freelance">Freelance</option>
          </select>
        </div>
      </section>

      <!-- Results Info -->
      <div class="results-info">
        Showing <span id="resultCount">0</span> vacancies
      </div>

      <!-- Job Cards Grid -->
      <div id="jobsContainer" class="jobs-grid"></div>

      <!-- In-feed Ad after some rows (visible dynamically) -->
      <div class="infeed-ad">Ad Space – 300x250</div>
    </main>

    <!-- Right Sidebar for Ads -->
    <aside class="sidebar">
      <div class="sticky-ads">
        <div class="ad-rectangle">Ad Space – 300x250</div>
        <div class="ad-rectangle">Ad Space – 300x600</div>
      </div>
    </aside>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 IndianJobsPortal.com | All job listings link to official websites.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
